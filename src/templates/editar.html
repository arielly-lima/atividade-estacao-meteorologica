{% extends 'base.html' %}
{% block content %}
<h2>Editar Leitura #{{ leitura.id }}</h2>
<form action="/leituras/{{ leitura.id }}" method="POST">
    <div style="margin-bottom: 10px;">
        <label>Temperatura (°C):</label><br>
        <input type="number" step="0.1" name="temperatura" value="{{ leitura.temperatura }}" required>
    </div>
    
    <div style="margin-bottom: 10px;">
        <label>Umidade (%):</label><br>
        <input type="number" step="0.1" name="umidade" value="{{ leitura.umidade }}" required>
    </div>

    <div style="margin-bottom: 10px;">
        <label>Pressão (opcional):</label><br>
        <input type="number" step="0.01" name="pressao" value="{{ leitura.pressao }}">
    </div>

    <button type="submit" style="background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px;">
        Salvar Alterações
    </button>
    <a href="/leituras" style="margin-left: 10px;">Cancelar</a>
</form>
{% endblock %}
