{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <div class="card shadow-sm p-4 text-center">
            <h5>Temperatura Atual</h5>
            <div class="dashboard-val" id="current-temp">-- °C</div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card shadow-sm p-4 text-center">
            <h5>Umidade Atual</h5>
            <div class="dashboard-val" id="current-umid">-- %</div>
        </div>
    </div>
</div>

<div class="row mb-4">
    <div class="col-12">
        <div class="card shadow-sm p-4">
            <h5>Variação Temporal (Últimas 10 leituras)</h5>
            <canvas id="meuGrafico" height="100"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    let meuGrafico;

    async function atualizarDashboard() {
        const resp = await fetch('/leituras?formato=json');
        const dados = await resp.json();
        
        if (dados.length > 0) {
            const ultima = dados[0];
            document.getElementById('current-temp').innerText = `${ultima.temperatura} °C`;
            document.getElementById('current-umid').innerText = `${ultima.umidade} %`;

            const ultimos10 = dados.slice(0, 10).reverse();
            const labels = ultimos10.map(d => d.timestamp.split(' ')[1]); // Pega só a hora
            const temps = ultimos10.map(d => d.temperatura);

            if (meuGrafico) meuGrafico.destroy();
            
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            meuGrafico = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Temperatura (°C)',
                        data: temps,
                        borderColor: '#dc3545',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(220, 53, 69, 0.1)'
                    }]
                }
            });
        }
    }

    // Atualiza a cada 5 segundos para simular tempo real
    setInterval(atualizarDashboard, 5000);
    atualizarDashboard();
</script>
{% endblock %}
